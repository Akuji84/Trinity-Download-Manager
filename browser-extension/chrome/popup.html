<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trinity Download Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <div class="popup-status" id="popup-status">Looking for Trinity...</div>
      <button class="menu-item" id="toggle-capture" type="button"></button>
      <button class="menu-item" id="toggle-site" type="button"></button>
      <div class="menu-separator" role="presentation"></div>
      <button class="menu-item" id="open-options" type="button">Options</button>
      <button class="menu-item" id="open-help" type="button">Help and Feedback</button>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
